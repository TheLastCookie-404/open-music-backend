name: deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    env:
      SUPER_ADMIN_NAME: ${{ secrets.SUPER_ADMIN_NAME }}
      SUPER_ADMIN_MAIL: ${{ secrets.SUPER_ADMIN_MAIL }}
      SUPER_ADMIN_HASH_SECRET: ${{ secrets.SUPER_ADMIN_HASH_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: pull via ssh
        run: |
          sshpass -p ${{ secrets.SSH_PASSWORD }} \
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          'cd ~/open-music.the-last-cookie.site && git pull origin main'
